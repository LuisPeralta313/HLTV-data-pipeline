hltv:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "../warehouse/hltv.duckdb"
      threads: 4
    prod:
      type: postgres
      host: "{{ env_var('SUPABASE_HOST') }}"
      user: "{{ env_var('SUPABASE_USER') }}"
      password: "{{ env_var('SUPABASE_PW') }}"
      port: "{{ env_var('SUPABASE_PORT') | int }}"
      dbname: "{{ env_var('SUPABASE_DB') }}"
      schema: public
      threads: 4
      connect_timeout: 10
